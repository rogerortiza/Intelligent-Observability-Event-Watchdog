name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff check
        run: ruff check .

  # ── 2. Unit & Integration Tests ──────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    if: hashFiles('tests/**') != ''

    env:
      # Unit and integration tests use SQLite — no live Supabase connection needed.
      # SUPABASE_DB_URL is still required by pydantic-settings at import time;
      # the secret provides a real value for PRs, the fallback satisfies imports
      # in forks or branches where the secret is not available.
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || 'postgresql://ci:ci@localhost:5432/ci_placeholder' }}
      TEST_DATABASE_URL: sqlite:///./test_watchdog.db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --cov=app \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. Smoke Test (PR → main only) ───────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && hashFiles('tests/**') != ''

    env:
      # Smoke test starts the real FastAPI server — requires a live DB connection.
      # Set SUPABASE_DB_URL in: Settings → Secrets and variables → Actions.
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      API_BASE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start FastAPI server in background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "UVICORN_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API to be healthy (max 60s)
        run: |
          echo "Polling http://localhost:8000/api/v1/health ..."
          STATUS="000"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health)
            if [ "$STATUS" = "200" ]; then
              echo "API ready after attempt $i"
              break
            fi
            echo "  attempt $i: HTTP $STATUS — retrying in 2s"
            sleep 2
          done
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: API did not become healthy within 60 seconds"
            exit 1
          fi

      - name: Run smoke test
        run: python tests/smoke_test.py

      - name: Stop FastAPI server
        if: always()
        run: kill "$UVICORN_PID" 2>/dev/null || true
